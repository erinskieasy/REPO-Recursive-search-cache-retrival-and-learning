<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agentic Tool Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .match-card {
      border-left: 4px solid #3b82f6;
    }
    .match-card.audition {
      border-left-color: #f59e0b; /* highlight audition tools */
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-container">
        <div class="logo-icon"></div>
        <h1>Agentic Tool Search</h1>
      </div>
      <p class="subtitle">Recursive Search Cache Retrieval & Learning System</p>
      <p class="subtitle" style="margin-top: 5px; font-size: 0.9rem;"><a href="/tools.html" style="color: #3b82f6; text-decoration: none; border-bottom: 1px dashed #3b82f6;">Manage Tool Database</a></p>
    </header>

    <main class="app-main">
      <div class="search-section">
        <form id="prompt-form" class="prompt-form">
          <div class="input-wrapper">
            <input 
              type="text" 
              id="prompt-input" 
              placeholder="e.g. I need you to perform a web search..."
              autocomplete="off"
              required
            />
            <button type="submit" id="submit-btn" class="submit-btn">
              <span class="btn-text">Execute Tool</span>
              <div class="loader-spinner" style="display: none;"></div>
            </button>
          </div>
        </form>
      </div>

      <div class="results-section" id="results-section" style="display: none;">
        <div class="logs-container">
          <h3>Agent Logs</h3>
          <div class="logs-window" id="logs-window">
            <!-- Logs will stream here -->
          </div>
        </div>

        <div class="matches-container">
          <div class="summary-header">
            <h3>Selected Tool candidate</h3>
            <span class="match-count" id="match-status">Awaiting Orchestrator</span>
          </div>
          <div class="matches-grid" id="selection-area" style="display: flex; flex-direction: column;">
            <!-- Matches will appear here -->
          </div>
          <div class="feedback-actions" id="feedback-actions" style="display:none; gap: 1rem; margin-top: 1rem;">
             <button id="btn-agree" class="btn-primary" style="background:#10b981; border:none; padding: 0.75rem 1rem; border-radius: 4px; color:#fff; cursor:pointer; font-weight:bold;">Agree (Simulate Success)</button>
             <button id="btn-disagree" class="btn-danger" style="background:#ef4444; border:none; padding: 0.75rem 1rem; border-radius: 4px; color:#fff; cursor:pointer; font-weight:bold;">Disagree (Try Next Batch)</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
